name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # First deploy uploads ~30k files (Drupal core + vendor) over single-host FTP — slow.
    # Subsequent deploys only mirror diffs and finish in 1-2 minutes.
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, gd, opcache, pdo_mysql, curl, zip, intl
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Cache composer + drupal core
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
            web/core
            web/modules/contrib
            web/themes/contrib
          key: composer-${{ hashFiles('composer.lock', 'composer.json') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-progress --prefer-dist

      - name: Prepare deployable artifact
        run: |
          # Strip files that should not ship to production.
          rm -rf .ddev .github .git
          rm -f .gitignore .gitattributes
          rm -f web/sites/default/settings.php web/sites/default/settings.local.php
          # Ensure target directories exist (lftp won't create unexpected paths).
          mkdir -p web/sites/default/files

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: FTP connectivity smoke test
        env:
          FTP_SERVER_RAW: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          LFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Sanitise: strip any ftp:// or ftps:// prefix, trailing slashes, and any
          # CR/LF/whitespace that may have come from a paste from another OS.
          FTP_SERVER="${FTP_SERVER_RAW#ftp://}"
          FTP_SERVER="${FTP_SERVER#ftps://}"
          FTP_SERVER="${FTP_SERVER%/}"
          FTP_SERVER="$(printf '%s' "$FTP_SERVER" | tr -d '[:space:]')"

          if [ -z "$FTP_SERVER" ]; then
            echo "::error::FTP_SERVER secret is empty after sanitisation."; exit 1
          fi

          # Length-only diagnostics — no values printed (still subject to GitHub masking).
          echo "FTP_SERVER chars: ${#FTP_SERVER}"
          echo "FTP_USERNAME chars: ${#FTP_USERNAME}"
          echo "LFTP_PASSWORD chars: ${#LFTP_PASSWORD}"

          # DNS pre-check — fails fast with a clear hostname (still masked, but message is explicit).
          getent hosts "$FTP_SERVER" >/dev/null || { echo "::error::DNS lookup for FTP_SERVER failed from the runner."; exit 1; }

          # Two-step probe: plain FTP first (isolates TLS), then explicit FTPS.
          # Hard 90s wall via `timeout` so a stalled handshake can never hang the step.
          # debug 3 shows the protocol exchange in the workflow log.
          echo "==== Probe 1: plain FTP (no TLS) ===="
          if timeout 90 lftp \
            -u "$FTP_USERNAME" \
            --env-password \
            -e "debug 3; set ssl:verify-certificate no; set ftp:ssl-allow no; set ftp:passive-mode true; set net:max-retries 1; set net:timeout 20; cls -1; bye" \
            "ftp://$FTP_SERVER"; then
            echo "::notice::Plain FTP probe OK"
            FTP_USE_TLS="no"
          else
            rc=$?
            echo "::warning::Plain FTP probe failed (exit $rc) — likely host firewall blocking the runner IP, or FTP not exposed"
            FTP_USE_TLS="probe2"
          fi

          if [ "$FTP_USE_TLS" = "probe2" ] || [ -z "$FTP_USE_TLS" ]; then
            echo "==== Probe 2: explicit FTPS (TLS on control channel) ===="
            if timeout 90 lftp \
              -u "$FTP_USERNAME" \
              --env-password \
              -e "debug 3; set ssl:verify-certificate no; set ftp:ssl-allow yes; set ftp:ssl-force true; set ftp:ssl-protect-data false; set ftp:passive-mode true; set net:max-retries 1; set net:timeout 20; cls -1; bye" \
              "ftp://$FTP_SERVER"; then
              echo "::notice::Explicit FTPS probe OK"
              FTP_USE_TLS="yes"
            else
              rc=$?
              echo "::error::Both plain FTP and FTPS failed (FTPS exit $rc). Likely host firewall blocking GitHub Actions runner IPs. See workflow notes for next steps."
              exit 1
            fi
          fi

          echo "FTP_SERVER=$FTP_SERVER" >> "$GITHUB_ENV"
          echo "FTP_USE_TLS=$FTP_USE_TLS" >> "$GITHUB_ENV"

      - name: Sync to cPanel
        env:
          # FTP_SERVER + FTP_USE_TLS come from the smoke test step.
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          LFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # parallel=3 stays under typical shared-cPanel FTP per-account caps (4-8).
          # FTP_USE_TLS is "yes" or "no" — chosen by the smoke test based on what worked.
          if [ "$FTP_USE_TLS" = "yes" ]; then
            SSL_OPTS="set ftp:ssl-allow yes; set ftp:ssl-force true; set ftp:ssl-protect-data false;"
          else
            SSL_OPTS="set ftp:ssl-allow no;"
          fi
          echo "Sync mode: TLS=$FTP_USE_TLS"

          lftp \
            -u "$FTP_USERNAME" \
            --env-password \
            -e "set ssl:verify-certificate no; \
                $SSL_OPTS \
                set ftp:passive-mode true; \
                set net:max-retries 10; \
                set net:reconnect-interval-base 5; \
                set net:reconnect-interval-multiplier 1.5; \
                set net:reconnect-interval-max 60; \
                set net:timeout 60; \
                set mirror:parallel-transfer-count 3; \
                mirror --reverse --delete --parallel=3 \
                  --exclude-glob web/sites/default/settings.php \
                  --exclude-glob web/sites/default/settings.local.php \
                  --exclude-glob web/sites/default/files/* \
                  --exclude-glob web/sites/default/files/ \
                  --verbose=1 \
                  ./ /; \
                bye" \
            "ftp://$FTP_SERVER"

      - name: Post-deploy smoke check
        run: |
          # Wait a beat for FTP to settle, then probe the site.
          sleep 10
          status=$(curl -sS -o /dev/null -w "%{http_code}" -L https://v3.centrepoint.co.id/ || echo "000")
          echo "Smoke check HTTP $status"
          # Drupal install hasn't run yet on first deploy, so 200/302/500 are all "site is reachable".
          if [ "$status" = "000" ]; then
            echo "::warning::Site unreachable — verify DNS + Apache pointing at public_html/v3/"
          else
            echo "::notice::Site reached — visit https://v3.centrepoint.co.id/install.php to finish setup"
          fi
