name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # First deploy uploads ~30k files (Drupal core + vendor) over single-host FTP — slow.
    # Subsequent deploys only mirror diffs and finish in 1-2 minutes.
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, gd, opcache, pdo_mysql, curl, zip, intl
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Cache composer + drupal core
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
            web/core
            web/modules/contrib
            web/themes/contrib
          key: composer-${{ hashFiles('composer.lock', 'composer.json') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-progress --prefer-dist

      - name: Prepare deployable artifact
        run: |
          # Strip files that should not ship to production.
          rm -rf .ddev .github .git
          rm -f .gitignore .gitattributes
          rm -f web/sites/default/settings.php web/sites/default/settings.local.php
          # Ensure target directories exist (lftp won't create unexpected paths).
          mkdir -p web/sites/default/files

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Sync to cPanel via parallel FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # lftp script — explicit FTPS (port 21 with TLS), 10 parallel transfers,
          # mirror --reverse uploads local→remote, --delete keeps remote in sync.
          # `--exclude-glob` protects runtime-owned content on the server.
          lftp -c "
          set ssl:verify-certificate no;
          set ftp:ssl-protect-data true;
          set ftp:passive-mode true;
          set net:max-retries 3;
          set net:reconnect-interval-base 5;
          set net:timeout 30;
          set mirror:parallel-transfer-count 10;
          set mirror:use-pget-n 4;
          open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"ftp://$FTP_SERVER\";
          mirror \
            --reverse \
            --delete \
            --parallel=10 \
            --exclude-glob web/sites/default/settings.php \
            --exclude-glob web/sites/default/settings.local.php \
            --exclude-glob web/sites/default/files/* \
            --exclude-glob web/sites/default/files/ \
            --verbose=1 \
            ./ /;
          bye
          "

      - name: Post-deploy smoke check
        run: |
          # Wait a beat for FTP to settle, then probe the site.
          sleep 10
          status=$(curl -sS -o /dev/null -w "%{http_code}" -L https://v3.centrepoint.co.id/ || echo "000")
          echo "Smoke check HTTP $status"
          # Drupal install hasn't run yet on first deploy, so 200/302/500 are all "site is reachable".
          if [ "$status" = "000" ]; then
            echo "::warning::Site unreachable — verify DNS + Apache pointing at public_html/v3/"
          else
            echo "::notice::Site reached — visit https://v3.centrepoint.co.id/install.php to finish setup"
          fi
